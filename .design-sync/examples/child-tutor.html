<!--
  Zeluu child tutor screen — the AI-tutor chat surface for kids (grades 1-9),
  composed entirely from the synced design-system components (window.ZeluuDS) +
  the bundle CSS, teal Spark brand. Socratic (guides, never gives answers),
  parent-visible, with a low-credit safe state. To render: copy into the built
  ds-bundle/ (asset paths are relative to the bundle root), serve it, open
  /child-tutor.html. See .design-sync/NOTES.md to rebuild the bundle.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zeluu — Tutor</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./_ds_bundle.css" />
  <script src="./_vendor/react.js"></script>
  <script src="./_vendor/react-dom.js"></script>
  <script src="./_ds_bundle.js"></script>
  <style>
    body { background: var(--color-warm-bg); margin: 0; }
    .shell { max-width: 760px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--color-surface); border-left: 1px solid var(--color-border); border-right: 1px solid var(--color-border); }
    .topbar { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-bottom: 1px solid var(--color-border); background: var(--color-surface-glass); }
    .brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 800; font-size: 20px; color: var(--color-text-dark); }
    .brand .spark { color: var(--color-accent); font-size: 22px; }
    .hi { font-size: 14px; color: var(--color-text-muted); }
    .hi b { color: var(--color-text-dark); }
    .goal { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .goal .lbl { font-size: 12px; color: var(--color-text-muted); white-space: nowrap; }
    .goal .bar { width: 110px; }
    .tabs-wrap { padding: 4px 20px 0; border-bottom: 1px solid var(--color-border); }
    .chat { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    .day { text-align: center; font-size: 12px; color: var(--color-text-light); text-transform: uppercase; letter-spacing: 0.06em; }
    .suggest { display: flex; flex-wrap: wrap; gap: 6px; align-self: flex-start; max-width: 85%; }
    .suggest .lead { width: 100%; font-size: 13px; color: var(--color-text-muted); margin-bottom: 2px; }
    .topictag-btn { cursor: pointer; }
    .typing { display: flex; align-items: center; gap: 8px; align-self: flex-start; font-size: 13px; color: var(--color-text-muted); }
    .meta { font-size: 11px; color: var(--color-text-light); align-self: flex-start; margin-top: -10px; padding-left: 4px; }
    .meta.user { align-self: flex-end; padding-right: 4px; }
    .inputbar { display: flex; gap: 10px; align-items: center; padding: 14px 20px; border-top: 1px solid var(--color-border); background: var(--color-surface); }
    .inputbar input { flex: 1; padding: 13px 16px; border: 1px solid var(--color-border); border-radius: var(--radius-full); background: var(--color-warm-bg); font-family: var(--font-body); font-size: 15px; color: var(--color-text-dark); outline: none; }
    .inputbar input:focus { border-color: var(--color-accent); background: var(--color-surface); box-shadow: 0 0 0 3px var(--color-accent-light); }
    .safety { text-align: center; font-size: 11px; color: var(--color-text-light); padding: 8px 20px 14px; }
    .safety b { color: var(--color-text-muted); }
    .lowcredit { display: flex; gap: 8px; align-items: center; justify-content: center; font-size: 13px; color: var(--color-text-dark); background: oklch(96% 0.03 80); border-top: 1px solid var(--color-warning); padding: 10px 20px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const h = React.createElement;
    const { SubjectTab, ChatBubble, Button, Spinner, CreditBadge, ProgressBar, TopicTag } = window.ZeluuDS;

    function Topbar() {
      return h('div', { className: 'topbar' },
        h('div', { className: 'brand' }, h('span', { className: 'spark' }, '✦'), 'Zeluu'),
        h('div', { className: 'hi' }, 'Hi, ', h('b', null, 'Layla'), ' 👋'),
        h('div', { className: 'goal' },
          h(CreditBadge, { level: 'low' }, '45 credits today'),
          h('span', { className: 'lbl' }, 'Daily goal 3/5'),
          h('div', { className: 'bar' }, h(ProgressBar, { value: 60 })),
        ),
      );
    }

    function Tabs() {
      return h('div', { className: 'tabs-wrap' },
        h('div', { className: 'subject-tabs' },
          h(SubjectTab, { label: 'Math', icon: '🧮', active: true }),
          h(SubjectTab, { label: 'Science', icon: '🔬' }),
          h(SubjectTab, { label: 'English', icon: '📖' }),
        ),
      );
    }

    function Chat() {
      return h('div', { className: 'chat' },
        h('div', { className: 'day' }, 'Today'),
        h(ChatBubble, { role: 'assistant' }, "Hi Layla! I'm your math tutor 🦊 What are we working on today? You can ask me anything, or tap a topic to start."),
        h('div', { className: 'suggest' },
          h('span', { className: 'lead' }, 'Popular this week:'),
          h(TopicTag, { className: 'topictag-btn' }, 'Adding fractions'),
          h(TopicTag, { className: 'topictag-btn' }, 'Long division'),
          h(TopicTag, { className: 'topictag-btn' }, 'Word problems'),
        ),
        h(ChatBubble, { role: 'user' }, 'How do I add 1/2 and 1/3?'),
        h(ChatBubble, { role: 'assistant' }, "Great question — let's figure it out together, not just get the answer 😊\nFractions can only be added when the bottom numbers (denominators) match. What's the smallest number that BOTH 2 and 3 divide into?"),
        h(ChatBubble, { role: 'user' }, '6?'),
        h(ChatBubble, { role: 'assistant' }, "Exactly! 👏 So we rewrite them over 6:\n1/2 = 3/6  and  1/3 = 2/6\nNow they match. What do you get when you add the tops: 3/6 + 2/6 ?"),
        h('div', { className: 'typing' }, h(Spinner), 'Layla is thinking…'),
      );
    }

    function InputBar() {
      return h(React.Fragment, null,
        h('div', { className: 'lowcredit' }, h('span', null, '⏳'), h('span', null, "You're low on credits — about 3 more questions today. A parent can add more anytime.")),
        h('div', { className: 'inputbar' },
          h('input', { type: 'text', placeholder: 'Ask your tutor a question…', 'aria-label': 'Message' }),
          h(Button, { size: 'sm' }, 'Send'),
        ),
        h('div', { className: 'safety' }, h('b', null, '🛡️ Safe space:'), ' Your parent can see every chat. The tutor guides you — it never just gives answers.'),
      );
    }

    function App() {
      return h('div', { className: 'shell' },
        h(Topbar), h(Tabs), h(Chat), h(InputBar),
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
