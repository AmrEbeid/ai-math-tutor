<!--
  Zeluu per-child progress report — a parent deep-dive into one child's learning,
  composed from the synced design-system components (window.ZeluuDS) + bundle CSS,
  teal Spark brand. Subject mastery (strengths/gaps), session history, focus areas.
  To render: copy into the built ds-bundle/, serve, open /child-report.html.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zeluu — Layla's progress</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./_ds_bundle.css" />
  <script src="./_vendor/react.js"></script>
  <script src="./_vendor/react-dom.js"></script>
  <script src="./_ds_bundle.js"></script>
  <style>
    body { background: var(--color-warm-bg); margin: 0; }
    .page { padding-bottom: var(--spacing-2xl); }
    .back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--color-text-muted); text-decoration: none; padding: var(--spacing-md) 0 4px; }
    .chead { display: flex; align-items: center; gap: 16px; padding-bottom: var(--spacing-md); }
    .av { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 30px; background: var(--color-accent-light); flex-shrink: 0; }
    .chead h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--color-text-dark); margin: 0; }
    .chead .meta { color: var(--color-text-muted); font-size: 14px; margin-top: 2px; }
    .chead .right { margin-left: auto; display: flex; gap: 8px; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-sm); margin-bottom: var(--spacing-lg); }
    .section-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--color-text-dark); margin: var(--spacing-lg) 0 var(--spacing-sm); }
    .subj { padding: 14px 0; border-bottom: 1px solid var(--color-border); }
    .subj:last-child { border-bottom: none; }
    .subj .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .subj .nm { font-weight: 600; color: var(--color-text-dark); display: flex; align-items: center; gap: 8px; }
    .subj .pct { font-weight: 700; color: var(--color-accent); }
    .subj .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); }
    .sess { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--color-border); }
    .sess:last-child { border-bottom: none; }
    .sess .ic { width: 34px; height: 34px; border-radius: 9px; background: var(--color-warm-bg); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .sess .m { flex: 1; min-width: 0; } .sess .m .t { font-size: 14px; font-weight: 600; color: var(--color-text-dark); } .sess .m .s { font-size: 12px; color: var(--color-text-muted); }
    .focus { display: flex; gap: 10px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--color-border); }
    .focus:last-child { border-bottom: none; }
    .focus .e { font-size: 18px; } .focus .b { flex: 1; } .focus .b .t { font-size: 14px; font-weight: 600; color: var(--color-text-dark); } .focus .b .s { font-size: 13px; color: var(--color-text-muted); }
    @media (max-width: 860px) { .stat-grid { grid-template-columns: 1fr 1fr; } .two { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const h = React.createElement;
    const { NavBar, Container, Button, Card, StatCard, ProgressBar, TopicTag, Badge, InfoCell } = window.ZeluuDS;

    function Subject({ name, icon, pct, strong, gap }) {
      return h('div', { className: 'subj' },
        h('div', { className: 'row' },
          h('div', { className: 'nm' }, h('span', null, icon), name),
          h('div', { className: 'pct' }, pct + '%'),
        ),
        h(ProgressBar, { value: pct }),
        h('div', { className: 'tags' },
          strong.map((t, i) => h(TopicTag, { key: 's' + i }, '✓ ' + t)),
          gap.map((t, i) => h(Badge, { key: 'g' + i, status: 'soon' }, t)),
        ),
      );
    }

    function App() {
      return h(React.Fragment, null,
        h(NavBar, { brand: 'Zeluu', logo: h('span', { style: { color: 'var(--color-accent)', fontSize: 22 } }, '✦'),
          actions: h(Button, { variant: 'secondary', size: 'sm' }, 'Dashboard') }),
        h('div', { className: 'page' },
          h(Container, null,
            h('a', { className: 'back', href: '#' }, '← All children'),
            h('div', { className: 'chead' },
              h('div', { className: 'av' }, '👧'),
              h('div', null,
                h('h1', null, 'Layla'),
                h('div', { className: 'meta' }, 'Grade 5 · English + Arabic · Learning with Zeluu since March'),
              ),
              h('div', { className: 'right' },
                h(Button, { variant: 'secondary', size: 'sm' }, 'Export PDF'),
                h(Button, { size: 'sm' }, 'Open app'),
              ),
            ),
            h('div', { className: 'stat-grid' },
              h(StatCard, { value: '24', label: 'Lessons this month' }),
              h(StatCard, { value: '6.2h', label: 'Time learning' }),
              h(StatCard, { value: '88%', label: 'Avg. quiz score' }),
              h(StatCard, { value: '12', label: 'Day streak' }),
            ),
            h('div', { className: 'section-title' }, 'Subject mastery'),
            h(Card, null,
              h(Subject, { name: 'Mathematics', icon: '🧮', pct: 84, strong: ['Fractions', 'Multiplication'], gap: ['Long division'] }),
              h(Subject, { name: 'Science', icon: '🔬', pct: 64, strong: ['Plants'], gap: ['The water cycle', 'Forces'] }),
              h(Subject, { name: 'English', icon: '📖', pct: 91, strong: ['Reading', 'Spelling', 'Past tense'], gap: [] }),
            ),
            h('div', { className: 'two' },
              h('div', null,
                h('div', { className: 'section-title' }, 'Recent sessions'),
                h(Card, null,
                  [['🧮', 'Fractions practice', 'Mon · 12 min', 'now', '9/10'],
                   ['🔬', 'The water cycle', 'Sun · 8 min', 'soon', '5/10'],
                   ['📖', 'Reading comprehension', 'Sat · 15 min', 'now', '10/10'],
                   ['🧮', 'Word problems', 'Fri · 10 min', 'now', '8/10']].map((s, i) =>
                    h('div', { className: 'sess', key: i },
                      h('div', { className: 'ic' }, s[0]),
                      h('div', { className: 'm' }, h('div', { className: 't' }, s[1]), h('div', { className: 's' }, s[2] + ' · ' + s[4] + ' correct')),
                      h(Badge, { status: s[3] }, s[3] === 'now' ? 'Strong' : 'Review'),
                    )),
                ),
              ),
              h('div', null,
                h('div', { className: 'section-title' }, 'Focus areas'),
                h(Card, null,
                  h('div', { className: 'focus' }, h('span', { className: 'e' }, '🎯'),
                    h('div', { className: 'b' }, h('div', { className: 't' }, 'Long division'),
                      h('div', { className: 's' }, 'Missed 4 of 6 this month. The tutor will weave in extra practice.'))),
                  h('div', { className: 'focus' }, h('span', { className: 'e' }, '💧'),
                    h('div', { className: 'b' }, h('div', { className: 't' }, 'The water cycle'),
                      h('div', { className: 's' }, 'New topic — Layla is just getting started. Encourage a short session.'))),
                  h('div', { className: 'focus' }, h('span', { className: 'e' }, '🌟'),
                    h('div', { className: 'b' }, h('div', { className: 't' }, 'Reading is a real strength'),
                      h('div', { className: 's' }, '91% mastery — consider a slightly harder reading level.'))),
                ),
              ),
            ),
          ),
        ),
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
