name: tests

# Runs the backend test suite and the design-system component tests on every PR
# and on pushes to main. Neither suite was running in CI before this workflow.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: npm test

  design-system:
    name: Design-system component tests (ds-src)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install ds-src deps
        working-directory: ds-src
        run: npm install --no-audit --no-fund
      - name: Build + test
        working-directory: ds-src
        run: npm test
